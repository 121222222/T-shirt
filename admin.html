<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEG文化衫管理后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#f0f2f5;color:#333}
.layout{display:flex;height:100vh}
.sidebar{width:240px;background:#001529;color:#fff;display:flex;flex-direction:column;flex-shrink:0;transition:width .3s;overflow:hidden}
.sidebar.collapsed{width:64px}
.sidebar-header{padding:20px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar-logo{width:32px;height:32px;background:linear-gradient(135deg,#1890ff,#36cfc9);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sidebar-title{font-size:16px;font-weight:700;white-space:nowrap}
.sidebar.collapsed .sidebar-title{display:none}
.sidebar-menu{flex:1;padding:12px 0;overflow-y:auto}
.menu-group{margin-bottom:8px}
.menu-group-title{padding:8px 24px;font-size:11px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:1px;white-space:nowrap}
.sidebar.collapsed .menu-group-title{display:none}
.menu-item{display:flex;align-items:center;gap:12px;padding:10px 24px;cursor:pointer;transition:all .2s;color:rgba(255,255,255,.65);font-size:14px;white-space:nowrap}
.menu-item:hover{color:#fff;background:rgba(255,255,255,.06)}
.menu-item.active{color:#fff;background:#1890ff}
.menu-item .icon{font-size:18px;width:20px;text-align:center;flex-shrink:0}
.sidebar.collapsed .menu-item span:not(.icon){display:none}
.sidebar.collapsed .menu-item{justify-content:center;padding:10px 0}
.sidebar-footer{padding:15px;border-top:1px solid rgba(255,255,255,.1)}
.sidebar-user{display:flex;align-items:center;gap:10px}
.sidebar-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0}
.sidebar-userinfo{overflow:hidden}
.sidebar-username{font-size:13px;font-weight:600}
.sidebar-userrole{font-size:11px;color:rgba(255,255,255,.5)}
.sidebar.collapsed .sidebar-userinfo{display:none}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.header{height:56px;background:#fff;border-bottom:1px solid #e8e8e8;display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0}
.header-left{display:flex;align-items:center;gap:16px}
.toggle-btn{width:36px;height:36px;border:none;background:none;cursor:pointer;font-size:20px;color:#666;border-radius:6px;display:flex;align-items:center;justify-content:center}
.toggle-btn:hover{background:#f5f5f5}
.breadcrumb{font-size:14px;color:#999}
.breadcrumb span{color:#333;font-weight:500}
.header-right{display:flex;align-items:center;gap:16px}
.hbtn{padding:6px 14px;border:1px solid #d9d9d9;background:#fff;border-radius:6px;font-size:13px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px}
.hbtn:hover{border-color:#1890ff;color:#1890ff}
.hbtn-p{background:#1890ff;color:#fff;border-color:#1890ff}
.hbtn-p:hover{background:#40a9ff}
.content{flex:1;overflow-y:auto;padding:24px}
.sec{display:none}.sec.active{display:block}
.stat-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.05);transition:transform .2s}
.stat-card:hover{transform:translateY(-2px)}
.stat-card-title{font-size:13px;color:#999;margin-bottom:8px}
.stat-card-value{font-size:32px;font-weight:700;color:#1a1a2e}
.stat-card-sub{font-size:12px;color:#52c41a;margin-top:6px}
.stat-card-sub.down{color:#ff4d4f}
.stat-card-icon{float:right;width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px}
.card{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.05);margin-bottom:20px;overflow:hidden}
.card-hd{padding:16px 20px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between}
.card-tt{font-size:16px;font-weight:600}
.card-bd{padding:20px}
.card-bd-np{padding:0}
.dtable{width:100%;border-collapse:collapse;font-size:13px}
.dtable th{background:#fafafa;padding:12px 16px;text-align:left;font-weight:600;color:#666;border-bottom:1px solid #f0f0f0;white-space:nowrap}
.dtable td{padding:12px 16px;border-bottom:1px solid #f5f5f5;color:#333}
.dtable tr:hover{background:#fafafa}
.tag{display:inline-block;padding:2px 10px;border-radius:10px;font-size:12px;font-weight:500}
.tag-g{background:#f6ffed;color:#52c41a;border:1px solid #b7eb8f}
.tag-r{background:#fff2f0;color:#ff4d4f;border:1px solid #ffa39e}
.tag-b{background:#e6f7ff;color:#1890ff;border:1px solid #91d5ff}
.tag-o{background:#fff7e6;color:#fa8c16;border:1px solid #ffd591}
.fbar{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:16px;align-items:center}
.fitem{display:flex;align-items:center;gap:6px;font-size:13px}
.fitem label{color:#666;white-space:nowrap}
.fsel,.finp{padding:7px 12px;border:1px solid #d9d9d9;border-radius:6px;font-size:13px;background:#fff;outline:none;min-width:140px}
.fsel:focus,.finp:focus{border-color:#1890ff;box-shadow:0 0 0 2px rgba(24,144,255,.1)}
.fbtn{padding:7px 16px;background:#1890ff;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px}
.fbtn:hover{background:#40a9ff}
.fbtn-o{background:#fff;color:#666;border:1px solid #d9d9d9}
.fbtn-o:hover{color:#1890ff;border-color:#1890ff}
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.chart-box{background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.chart-box-title{font-size:15px;font-weight:600;margin-bottom:16px}
.bar-chart{display:flex;align-items:flex-end;justify-content:space-around;height:200px;padding:0 10px}
.bar-item{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;max-width:80px}
.bar-value{font-size:12px;font-weight:600;color:#333}
.bar-fill{width:40px;border-radius:6px 6px 0 0;transition:height .6s;min-height:4px}
.bar-label{font-size:11px;color:#999;text-align:center}
.pie-chart{display:flex;align-items:center;justify-content:center;gap:30px}
.pie-visual{width:160px;height:160px;border-radius:50%}
.pie-legend{display:flex;flex-direction:column;gap:10px}
.pie-legend-item{display:flex;align-items:center;gap:8px;font-size:13px}
.pie-legend-dot{width:12px;height:12px;border-radius:3px}
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.proj-card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.05);cursor:pointer;transition:all .2s;border:2px solid transparent}
.proj-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.proj-card.act{border-color:#1890ff}
.modal-ov{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);display:none;justify-content:center;align-items:center;z-index:1000}
.modal-ov.show{display:flex}
.modal{background:#fff;border-radius:12px;width:90%;max-width:640px;max-height:85vh;overflow-y:auto;animation:mIn .3s}
@keyframes mIn{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
.modal-hd{padding:20px 24px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:2;border-radius:12px 12px 0 0}
.modal-tt{font-size:18px;font-weight:700}
.modal-cl{width:32px;height:32px;border:none;background:none;cursor:pointer;font-size:20px;color:#999;border-radius:6px;display:flex;align-items:center;justify-content:center}
.modal-cl:hover{background:#f5f5f5;color:#333}
.modal-bd{padding:24px}
.modal-ft{padding:16px 24px;border-top:1px solid #f0f0f0;display:flex;justify-content:flex-end;gap:12px;position:sticky;bottom:0;background:#fff;border-radius:0 0 12px 12px}
.frow{margin-bottom:20px}
.flbl{display:block;font-size:14px;font-weight:500;color:#333;margin-bottom:8px}
.flbl .req{color:#ff4d4f}
.fctl{width:100%;padding:8px 12px;border:1px solid #d9d9d9;border-radius:6px;font-size:14px;outline:none;transition:all .2s;font-family:inherit}
.fctl:focus{border-color:#1890ff;box-shadow:0 0 0 2px rgba(24,144,255,.1)}
.steps{display:flex;align-items:center;margin-bottom:30px}
.step-i{display:flex;align-items:center;gap:8px}
.step-n{width:28px;height:28px;border-radius:50%;background:#e8e8e8;color:#999;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600}
.step-i.active .step-n{background:#1890ff;color:#fff}
.step-i.done .step-n{background:#52c41a;color:#fff}
.step-t{font-size:13px;color:#999}
.step-i.active .step-t{color:#333;font-weight:500}
.step-i.done .step-t{color:#52c41a}
.step-l{flex:1;height:1px;background:#e8e8e8;margin:0 12px}
.scfg-list{display:flex;flex-direction:column;gap:12px}
.scfg-item{border:1px solid #f0f0f0;border-radius:8px;padding:12px;display:flex;align-items:center;gap:12px}
.scfg-img{width:60px;height:60px;border-radius:8px;background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;overflow:hidden}
.scfg-img img{width:100%;height:100%;object-fit:cover}
.scfg-fields{flex:1;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.scfg-fields input,.scfg-fields select{padding:6px 10px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px}
.scfg-rm{width:32px;height:32px;border:none;background:#fff2f0;color:#ff4d4f;border-radius:6px;cursor:pointer;font-size:16px}
.add-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;border:2px dashed #d9d9d9;border-radius:8px;cursor:pointer;color:#999;font-size:13px;transition:all .2s}
.add-btn:hover{border-color:#1890ff;color:#1890ff}
.progress-h{height:8px;background:#f0f0f0;border-radius:4px;overflow:hidden}
.progress-f{height:100%;border-radius:4px;transition:width .6s}
.h5-link{background:linear-gradient(135deg,#667eea,#764ba2);border-radius:12px;padding:24px;color:#fff;margin-bottom:20px}
.h5-link-tt{font-size:16px;font-weight:600;margin-bottom:8px}
.h5-link-url{background:rgba(255,255,255,.15);border-radius:8px;padding:10px 14px;font-size:13px;display:flex;align-items:center;justify-content:space-between;gap:10px;word-break:break-all}
.h5-link-copy{background:rgba(255,255,255,.25);border:none;color:#fff;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;white-space:nowrap}
.h5-link-copy:hover{background:rgba(255,255,255,.35)}
.tabs{display:flex;border-bottom:1px solid #f0f0f0;margin-bottom:20px}
.tab-i{padding:10px 20px;font-size:14px;color:#999;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab-i.active{color:#1890ff;border-bottom-color:#1890ff;font-weight:500}
.tab-c{display:none}.tab-c.active{display:block}
.empty{text-align:center;padding:60px 20px;color:#999}
.empty-icon{font-size:60px;margin-bottom:15px}
.empty-text{font-size:15px;margin-bottom:20px}
.msg{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:10px 24px;border-radius:8px;font-size:14px;z-index:2000;display:none;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.msg.show{display:block;animation:msgIn .3s}
@keyframes msgIn{from{transform:translateX(-50%) translateY(-20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
.msg-s{background:#f6ffed;color:#52c41a;border:1px solid #b7eb8f}
.msg-e{background:#fff2f0;color:#ff4d4f;border:1px solid #ffa39e}
.msg-i{background:#e6f7ff;color:#1890ff;border:1px solid #91d5ff}
@media(max-width:1024px){.chart-row{grid-template-columns:1fr}.stat-cards{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){.sidebar{position:fixed;z-index:100;height:100vh;transform:translateX(-100%)}.sidebar.mobile-show{transform:translateX(0)}.stat-cards{grid-template-columns:1fr}.scfg-fields{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="layout">
<div class="sidebar" id="sidebar">
<div class="sidebar-header"><div class="sidebar-logo">👕</div><div class="sidebar-title">TEG文化衫后台</div></div>
<div class="sidebar-menu">
<div class="menu-group"><div class="menu-group-title">项目管理</div>
<div class="menu-item active" onclick="go('dash')" data-p="dash"><span class="icon">📊</span><span>数据看板</span></div>
<div class="menu-item" onclick="go('proj')" data-p="proj"><span class="icon">📁</span><span>项目列表</span></div>
<div class="menu-item" onclick="go('create')" data-p="create"><span class="icon">➕</span><span>新建项目</span></div>
</div>
<div class="menu-group"><div class="menu-group-title">数据管理</div>
<div class="menu-item" onclick="go('subs')" data-p="subs"><span class="icon">📋</span><span>选款数据</span></div>
<div class="menu-item" onclick="go('miss')" data-p="miss"><span class="icon">🔍</span><span>缺漏排查</span></div>
<div class="menu-item" onclick="go('order')" data-p="order"><span class="icon">📦</span><span>下单明细</span></div>
<div class="menu-item" onclick="go('ship')" data-p="ship"><span class="icon">🚚</span><span>装箱邮寄</span></div>
</div>
<div class="menu-group"><div class="menu-group-title">系统设置</div>
<div class="menu-item" onclick="go('emp')" data-p="emp"><span class="icon">👥</span><span>员工管理</span></div>
<div class="menu-item" onclick="go('h5cfg')" data-p="h5cfg"><span class="icon">⚙️</span><span>H5配置</span></div>
<div class="menu-item" onclick="go('logs')" data-p="logs"><span class="icon">📝</span><span>操作日志</span></div>
</div>
</div>
<div class="sidebar-footer"><div class="sidebar-user"><div class="sidebar-avatar">管</div><div class="sidebar-userinfo"><div class="sidebar-username">管理员</div><div class="sidebar-userrole">超级管理员</div></div></div></div>
</div>
<div class="main">
<div class="header">
<div class="header-left"><button class="toggle-btn" onclick="document.getElementById('sidebar').classList.toggle('collapsed')">☰</button><div class="breadcrumb">TEG文化衫后台 / <span id="bc">数据看板</span></div></div>
<div class="header-right"><button class="hbtn" onclick="refreshAll()">🔄 刷新</button><button class="hbtn hbtn-p" onclick="go('create')">➕ 新建项目</button></div>
</div>
<div class="content" id="content"></div>
</div>
</div>
<div class="modal-ov" id="modal-sup">
<div class="modal"><div class="modal-hd"><div class="modal-tt">手动补登</div><button class="modal-cl" onclick="closeM('modal-sup')">✕</button></div>
<div class="modal-bd">
<div class="frow"><label class="flbl">员工 <span class="req">*</span></label><select class="fctl" id="sup-emp"></select></div>
<div class="frow"><label class="flbl">款式 <span class="req">*</span></label><select class="fctl" id="sup-sty"></select></div>
<div class="frow"><label class="flbl">尺码 <span class="req">*</span></label><select class="fctl" id="sup-sz"><option value="">请选择</option><option>XS</option><option>S</option><option>M</option><option>L</option><option>XL</option><option>XXL</option><option>XXXL</option></select></div>
<div class="frow"><label class="flbl">接收职场 <span class="req">*</span></label><select class="fctl" id="sup-addr"></select></div>
</div>
<div class="modal-ft"><button class="fbtn fbtn-o" onclick="closeM('modal-sup')">取消</button><button class="fbtn" onclick="doSupplement()">确认补登</button></div>
</div></div>
<div class="modal-ov" id="modal-emp">
<div class="modal"><div class="modal-hd"><div class="modal-tt">新增员工</div><button class="modal-cl" onclick="closeM('modal-emp')">✕</button></div>
<div class="modal-bd">
<div class="frow"><label class="flbl">姓名 <span class="req">*</span></label><input class="fctl" id="emp-n"></div>
<div class="frow"><label class="flbl">工号 <span class="req">*</span></label><input class="fctl" id="emp-i"></div>
<div class="frow"><label class="flbl">部门 <span class="req">*</span></label><input class="fctl" id="emp-d"></div>
<div class="frow"><label class="flbl">常用职场</label><input class="fctl" id="emp-w"></div>
</div>
<div class="modal-ft"><button class="fbtn fbtn-o" onclick="closeM('modal-emp')">取消</button><button class="fbtn" onclick="saveEmp()">保存</button></div>
</div></div>
<div class="msg" id="gmsg"></div>
<script src="admin.js"></script>
</body>
</html>
